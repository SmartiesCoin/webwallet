version: "3.8"

services:
  api:
    build: ./backend
    container_name: smt-wallet-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - PORT=3001
      - RPC_HOST=172.17.0.1
      - RPC_PORT=8282
      - RPC_USER=smt_rpc
      - RPC_PASS=${RPC_PASS}
      - CORS_ORIGIN=https://wallet.smartiecoin.com
      - EXPLORER_URL=http://172.17.0.1:8092
    networks:
      - wallet

  frontend:
    image: nginx:alpine
    container_name: smt-wallet-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wallet

networks:
  wallet:
    driver: bridge
